services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhook_gateway
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook_password
    volumes:
      - webhook-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhook_gateway"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - webhook-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    user: "10001:10001"
    env_file: .env
    command: ["node", "dist/server.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:7373:7373"
    volumes:
      - webhook-spool:/spool
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  worker:
    build: .
    user: "10001:10001"
    env_file: .env
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - webhook-spool:/spool
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  webhook-postgres:
  webhook-redis:
  webhook-spool:
