name: CI

on:
  push:
    branches: [main, agent/**]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: webhook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d webhook_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test:test@127.0.0.1:5432/webhook_test
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/webhook-gateway-v2-complete
      - name: Apply one-time Express async boundary patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          api = Path('src/system/api-system.ts')
          text = api.read_text()
          import_line = "import { asyncHandler } from '../part/http.js';\n"
          if import_line not in text:
              anchor = "import { sha256Hex } from '../part/crypto.js';\n"
              if anchor not in text:
                  raise SystemExit('API import anchor not found')
              text = text.replace(anchor, anchor + import_line, 1)

          routes = [
              ("apiApp.get('/readyz', async (_req, res) => {", "apiApp.get('/metrics'"),
              ("apiApp.get('/metrics', async (_req, res) => {", "function requestIp"),
              ("apiApp.get('/admin/events', requireAdmin, async (req, res) => {", "apiApp.get('/admin/events/:id'"),
              ("apiApp.get('/admin/events/:id', requireAdmin, async (req, res) => {", "apiApp.post('/admin/events/:id/replay'"),
              ("apiApp.post('/admin/events/:id/replay', requireAdmin, async (req, res) => {", "apiApp.post('/admin/deliveries/:id/replay'"),
              ("apiApp.post('/admin/deliveries/:id/replay', requireAdmin, async (req, res) => {", "apiApp.get('/admin/audit-logs'"),
              ("apiApp.get('/admin/audit-logs', requireAdmin, async (_req, res) => {", "apiApp.post('/ingress/:slug'"),
              ("apiApp.post('/ingress/:slug', express.raw({ type: '*/*', limit: env.MAX_BODY_BYTES }), async (req, res) => {", "async function replayDenied")
          ]

          for start, next_marker in routes:
              wrapped = start.replace(', async (', ', asyncHandler(async (')
              if wrapped in text:
                  continue
              start_index = text.find(start)
              if start_index < 0:
                  raise SystemExit(f'route start not found: {start}')
              next_index = text.find(next_marker, start_index + len(start))
              if next_index < 0:
                  raise SystemExit(f'route end marker not found: {next_marker}')
              text = text[:start_index] + wrapped + text[start_index + len(start):]
              delta = len(wrapped) - len(start)
              next_index += delta
              segment = text[start_index:next_index]
              close_index = segment.rfind('\n});')
              if close_index < 0:
                  raise SystemExit(f'route closing not found before: {next_marker}')
              absolute = start_index + close_index
              text = text[:absolute] + '\n}));' + text[absolute + len('\n});'):]

          error_boundary = """apiApp.use((error: unknown, _req: express.Request, res: express.Response, next: express.NextFunction) => {
            if (res.headersSent) {
              next(error);
              return;
            }
            logGatewayEvent({
              level: 'error',
              event: 'api_unhandled_error',
              component: 'api-system',
              message: 'Unhandled API route error',
              details: { error: sanitizeText(error, 300) }
            });
            res.status(500).json({ error: 'internal server error' });
          });

          """
          marker = 'async function replayDenied('
          if 'api_unhandled_error' not in text:
              index = text.find(marker)
              if index < 0:
                  raise SystemExit('replayDenied marker not found')
              text = text[:index] + error_boundary + text[index:]

          api.write_text(text)
          PY
          if git diff --quiet -- src/system/api-system.ts; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/system/api-system.ts
          git commit -m "fix(api): route async failures through sanitized boundary"
          git push origin HEAD:agent/webhook-gateway-v2-complete
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: always() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce typecheck result
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Unit, integration, concurrency, and E2E tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee test.log
      - name: Upload test diagnostics
        if: always() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production JavaScript
        run: npm run build
      - name: Validate production container build
        run: docker build --target runtime -t webhook-gateway:ci .
      - name: Validate Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high
