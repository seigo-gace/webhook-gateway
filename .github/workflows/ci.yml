name: CI

on:
  push:
    branches: [main, agent/**]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: webhook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d webhook_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test:test@127.0.0.1:5432/webhook_test
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/webhook-gateway-v2-complete
      - name: Apply one-time migration advisory lock
        run: |
          python3 - <<'PY'
          from pathlib import Path

          db = Path('src/feature/db.ts')
          text = db.read_text()
          marker = "export async function persistIngressWithDeliveries("
          start = text.find('export async function migrate(): Promise<void> {')
          end = text.find(marker, start)
          if start < 0 or end < 0:
              raise SystemExit('migrate function boundaries not found')
          segment = text[start:end]
          if 'pg_advisory_lock' not in segment:
              opening = "export async function migrate(): Promise<void> {\n  await pool.query(`"
              replacement = """export async function migrate(): Promise<void> {
            const client = await pool.connect();
            try {
              await client.query(\"SELECT pg_advisory_lock(hashtext('gace_webhook_gateway_v2_migrate'))\");
              await client.query(`"""
              if opening not in segment:
                  raise SystemExit('migrate opening target not found')
              segment = segment.replace(opening, replacement, 1)
              closing = "  `);\n}\n\n"
              replacement = """    `);
            } finally {
              await client.query(\"SELECT pg_advisory_unlock(hashtext('gace_webhook_gateway_v2_migrate'))\").catch(() => undefined);
              client.release();
            }
          }

          """
              if not segment.endswith(closing):
                  raise SystemExit('migrate closing target not found')
              segment = segment[:-len(closing)] + replacement
              text = text[:start] + segment + text[end:]
          db.write_text(text)
          PY
          if git diff --quiet -- src/feature/db.ts; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/feature/db.ts
          git commit -m "fix(db): serialize concurrent startup migrations"
          git push origin HEAD:agent/webhook-gateway-v2-complete
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: always() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce typecheck result
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Unit, integration, concurrency, and E2E tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee test.log
      - name: Upload test diagnostics
        if: always() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production JavaScript
        run: npm run build
      - name: Validate production container build
        run: docker build --target runtime -t webhook-gateway:ci .
      - name: Validate Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high
