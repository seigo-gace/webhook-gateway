name: CI

on:
  push:
    branches: [main, agent/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: webhook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d webhook_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test:test@127.0.0.1:5432/webhook_test
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Unit, integration, concurrency, and E2E tests
        run: npm run test:ci
      - name: Build production JavaScript
        run: npm run build
      - name: Validate production container build
        run: docker build --target runtime -t webhook-gateway:ci .
      - name: Validate Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high
