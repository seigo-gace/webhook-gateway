name: CI

on:
  push:
    branches: [main, agent/**]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: webhook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d webhook_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test:test@127.0.0.1:5432/webhook_test
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Apply one-time P0 recovery patches
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/agent/')
        run: |
          python3 - <<'PY'
          from pathlib import Path

          worker = Path('src/system/worker-system.ts')
          text = worker.read_text()
          text = text.replace(
              'async function importSpoolFile(filePath: string): Promise<SpoolSweepResult> {',
              'export async function importSpoolFile(filePath: string): Promise<SpoolSweepResult> {'
          )
          old = """    const deliverySummary = event.duplicate
              ? { deliveries: 0, enqueued: 0 }
              : await createAndEnqueueDeliveriesForImportedEvent(event.id, source, verified.eventType);"""
          new = """    // Always reconcile idempotent delivery rows. A prior recovery attempt may
              // have inserted the event and failed before creating every delivery/outbox row.
              const deliverySummary = await createAndEnqueueDeliveriesForImportedEvent(
                event.id,
                source,
                verified.eventType
              );"""
          if old not in text and new not in text:
              raise SystemExit('worker reconciliation target not found')
          text = text.replace(old, new)
          worker.write_text(text)

          api = Path('src/system/api-system.ts')
          text = api.read_text()
          old = """  try {
              await redisConnection.ping();
              checks.redis = true;
            } catch (error) {
              ok = false;
              checks.redis = sanitizeText(error, 300);
            }"""
          new = """  try {
              await redisConnection.ping();
              checks.redis = { ok: true, requiredForIngress: false };
            } catch (error) {
              // Redis transports delivery jobs but is not the durable source of truth.
              // Keep ingress ready while reporting degraded asynchronous delivery.
              checks.redis = {
                ok: false,
                requiredForIngress: false,
                degraded: true,
                error: sanitizeText(error, 300)
              };
            }"""
          if old not in text and new not in text:
              raise SystemExit('readiness degradation target not found')
          text = text.replace(old, new)
          api.write_text(text)
          PY
          if git diff --quiet -- src/system/worker-system.ts src/system/api-system.ts; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/system/worker-system.ts src/system/api-system.ts
          git commit -m "fix(p0): reconcile spool deliveries and degrade without Redis"
          git push
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: always() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce typecheck result
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Unit, integration, concurrency, and E2E tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee test.log
      - name: Upload test diagnostics
        if: always() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production JavaScript
        run: npm run build
      - name: Validate production container build
        run: docker build --target runtime -t webhook-gateway:ci .
      - name: Validate Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high
